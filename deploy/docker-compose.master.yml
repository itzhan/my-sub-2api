# =============================================================================
# Sub2API - 主服务器 (Master)
# =============================================================================
# 运行 Sub2API + PostgreSQL + Redis，供子服务器连接。
#
# 部署步骤：
#   1. cp .env.master .env
#   2. 修改 .env 中的密码和密钥
#   3. mkdir -p data postgres_data redis_data
#   4. docker compose -f docker-compose.master.yml up -d --build
#   5. 访问 http://localhost:8080
#
# 注意：PostgreSQL 和 Redis 端口已暴露，供子服务器连接。
#       生产环境请配合防火墙，只允许子服务器 IP 访问 5432/6379。
# =============================================================================

services:
  # ===========================================================================
  # Sub2API 应用
  # ===========================================================================
  sub2api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sub2api-master
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}

      # 数据库（连接本地 PostgreSQL 容器）
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-256}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-128}

      # Redis（连接本地 Redis 容器）
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-4096}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-256}

      # 管理员
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

      # 密钥
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}

      # 时区
      - TZ=${TZ:-Asia/Shanghai}

      # === 性能优化（8000+ 账号分布式部署） ===
      - GATEWAY_SCHEDULING_LOCAL_SNAPSHOT_CACHE_TTL_SECONDS=${GATEWAY_SCHEDULING_LOCAL_SNAPSHOT_CACHE_TTL_SECONDS:-3}
      - GATEWAY_SCHEDULING_SNAPSHOT_READ_LIMIT=${GATEWAY_SCHEDULING_SNAPSHOT_READ_LIMIT:-500}
      - GATEWAY_SCHEDULING_MAX_CANDIDATES_FOR_LOAD_QUERY=${GATEWAY_SCHEDULING_MAX_CANDIDATES_FOR_LOAD_QUERY:-100}
      - GATEWAY_SCHEDULING_LEADER_ELECTION_ENABLED=${GATEWAY_SCHEDULING_LEADER_ELECTION_ENABLED:-true}
      - GATEWAY_SCHEDULING_OUTBOX_POLL_INTERVAL_SECONDS=${GATEWAY_SCHEDULING_OUTBOX_POLL_INTERVAL_SECONDS:-3}

      # === 日志 ===
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_SAMPLING_ENABLED=${LOG_SAMPLING_ENABLED:-true}
      - LOG_SAMPLING_INITIAL=${LOG_SAMPLING_INITIAL:-5}
      - LOG_SAMPLING_THEREAFTER=${LOG_SAMPLING_THEREAFTER:-200}
      - LOG_ROTATION_MAX_SIZE_MB=${LOG_ROTATION_MAX_SIZE_MB:-50}
      - LOG_ROTATION_MAX_BACKUPS=${LOG_ROTATION_MAX_BACKUPS:-3}
      - LOG_ROTATION_MAX_AGE_DAYS=${LOG_ROTATION_MAX_AGE_DAYS:-3}
      - LOG_OUTPUT_TO_STDOUT=true
      - LOG_OUTPUT_TO_FILE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # PostgreSQL（暴露端口供子服务器连接）
  # ===========================================================================
  postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${POSTGRES_BIND:-0.0.0.0}:${DATABASE_PORT:-5432}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Redis（暴露端口供子服务器连接）
  # ===========================================================================
  redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${REDIS_BIND:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis_data:/data
    command: >
        sh -c '
          redis-server
          --save 60 1
          --appendonly yes
          --appendfsync everysec
          --maxclients ${REDIS_MAXCLIENTS:-50000}
          ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-network:
    driver: bridge
